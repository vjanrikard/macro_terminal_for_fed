name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      BUILD_FRED_API_KEY: ${{ secrets.FRED_API_KEY || secrets.FED_API_KEY || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Inject API key
        run: |
          python3 -c "
          import os
          key = os.getenv('BUILD_FRED_API_KEY', '')
          content = open('fed_macro_terminal/index.template.html').read()
          content = content.replace('__FRED_API_KEY__', key)
          open('fed_macro_terminal/index.html', 'w').write(content)
          print('Done: fed_macro_terminal/index.html built')
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fed_macro_terminal
          publish_branch: gh-pages
          exclude_assets: '.env,.env.example,index.template.html,build.sh,.github,.vscode'
